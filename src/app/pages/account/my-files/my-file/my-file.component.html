<div class="my-file-content">
    <div class="form-group-my-file">
        <img src="FileImage.svg"/>
        <div class="form-group-my-file-infos">
            <label data-cy="file-name" class="my-file-name-label" [textContent]="filename()"></label>
            @if(file().daysUntilExpired > 0){
                <label data-cy="file-expiration" class="my-file-expiration-label" [textContent]="expiration()"></label>
            } @else {
                <label data-cy="file-expiration" class="my-file-expiration-label label-error" [textContent]="expiration()"></label>
            }
        </div>
        <div class="my-file-buttons">
            @if(file().daysUntilExpired > 0){
                @if (file().usePassword){
                    <img data-cy="password-icon" class="my-file-has-password" src="HasPassword.svg"/>
                }
                <button data-cy="delete-btn" class="my-file-button" (click)="deleteFileEvent()"><img src="Delete.svg" width="13px" height="13px"/>Supprimer</button>
                <button data-cy="goto-btn" class="my-file-button" (click)="gotoFile()"><span>Accéder</span><img src="GoTo.svg" width="11px" height="11px" class="goto-image"/></button>
            } @else {
                <label data-cy="expired-message" class="my-file-expired-message">Ce fichier a expiré, il n'est plus stocké chez nous</label>
            }
        </div>
    </div>
</div>
