<div class="modal-wrapper">
    <h2 class="form-title">Connexion</h2>
    <div class="form-wrapper">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input
                type="text"
                placeholder="Saisissez votre email..."
                formControlName="login"
                class="form-control"
                data-cy="login"
                [ngClass]="{ 'is-invalid': submitted && form['login'].errors }"
                />
                @if (submitted && form['login'].errors) {
                <div class="invalid-feedback">
                    @if (form['login'].errors['required']) {
                    <div>Login is required</div>
                    }
                </div>
                }
            </div>

            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input
                type="text"
                placeholder="Saisissez votre mot de passe..."
                formControlName="password"
                class="form-control"
                data-cy="password"
                [ngClass]="{ 'is-invalid': submitted && form['password'].errors }"
                />
                @if (submitted && form['password'].errors) {
                <div class="invalid-feedback">
                    @if (form['password'].errors['required']) {
                    <div>password is required</div>
                    }
                </div>
                }
            </div>

            <div class="form-group-button">
                <button class="form-button form-button-secondary" routerLink="/register">Créer un compte</button>
                <button class="form-button form-button-primary" type="submit">Connexion</button>
            </div>
        </form>
    </div>
</div>
