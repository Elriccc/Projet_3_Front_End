<div class="modal-wrapper">
    <h2 class="form-title">Télécharger un fichier</h2>
    <div class="form-wrapper">
    @if (daysUntilExpired() > 0){
        <form [formGroup]="downloadForm" (ngSubmit)="onSubmit()">
            @if (downloadError() != '') {
                <div class="form-group-message form-group-error">
                    <img alt="Error" src="Error.svg"/> 
                    <label class="form-group-message-label" [textContent]="downloadError()"></label>
                </div>
            }
            <div class="form-group-file">
                <div class="form-group-file-icon">
                    <img alt="File" src="FileImage.svg"/>
                </div>
                <div class="form-group-file-infos">
                    <label data-cy="file-name" class="file-name-label" [textContent]="fileName()"></label>
                    <label data-cy="file-size" class="file-size-label" [textContent]="fileSize()"></label>
                </div>
            </div>
            
            @if (daysUntilExpired() > 1) {
                <div data-cy="expiration-info" class="form-group-message form-group-info">
                    <img alt="Info" src="Info.svg"/> 
                    <label class="form-group-message-label" [textContent]="expirationMessage()"></label>
                </div>
            } @else {
                <div data-cy="expiration-alert" class="form-group-message form-group-alert">
                    <img alt="Alert" src="Alert.svg"/> 
                    <label class="form-group-message-label" [textContent]="expirationMessage()"></label>
                </div>
            }

            @if (usePassword()){
                <div data-cy="password-group" class="form-group">
                    <label class="form-label">Saisissez le mot de passe...</label>
                    <input
                    type="password"
                    placeholder="Optionnel"
                    formControlName="password"
                    class="form-control"
                    data-cy="password"
                    [ngClass]="{ 'is-invalid': submitted && form['password'].errors }"
                    />
                </div>
            }

            <div class="form-group-button">
                @if (usePassword() && form['password'].errors) {
                    <button data-cy="download-btn-disabled" type="button" class="form-button form-button-download-disabled"><img alt="Download" src="DownloadReadonly.svg" width="18px" height="18px"/>Télécharger</button>
                } @else {
                    <button data-cy="download-btn" type="button" class="form-button form-button-download" type="submit"><img alt="Download" src="Download.svg" width="18px" height="18px"/>Télécharger</button>
                }
            </div>
        </form>
    } @else if(loaded() == true) {
        <div class="form-group-message form-group-error">
            <img alt="Error" src="Error.svg"/> 
            <label data-cy="expired-message" class="form-group-message-label">Ce fichier n'est plus disponible en téléchargement car il a expiré</label>
        </div>
    }
    </div>
</div>
